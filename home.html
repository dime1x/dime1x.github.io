<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>自适应视频布局</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #000;
  }

  /* 顶部菜单 */
  .navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: #333;
    color: #fff;
    padding: 12px 20px;
    z-index: 10;
  }

  .content {
    padding-top: 70px;
  }

  /* 默认：手机端（宽度最大化） */
  .video-box {
    width: 100%;
    margin: 0;
  }

  video, iframe {
    width: 100%;
    height: auto;
    display: block;
  }

  /* 电脑端：宽度固定 + 居中 */
  @media (min-width: 900px) {
    .video-box {
      width: 800px;   /* 电脑端视频宽度 */
      margin: 0 auto; /* 居中 */
    }
  }
</style>
</head>

<body>

<div class="navbar">我的网站</div>

<div class="content">

  <div class="video-box">
    <video src="https://dogegoog.com/967711711.mp4" controls playsinline webkit-playsinline x5-playsinline></video>
  </div>

  <div class="video-box">
    <video src="https://dogegoog.com/967711711.mp4" controls playsinline webkit-playsinline x5-playsinline></video>
  </div>

  <div class="video-box">
    <iframe 
      src="https://www.youtube.com/embed/dQw4w9WgXcQ"
      allowfullscreen
      webkitallowfullscreen
      mozallowfullscreen>
    </iframe>
  </div>

</div>

</body>
</html>
