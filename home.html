<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>手机全屏宽度视频</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #000;
  }

  /* 顶部菜单 */
  .navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: #333;
    color: #fff;
    padding: 12px 20px;
    z-index: 10;
  }

  .content {
    padding-top: 70px;
  }

  /* 视频容器：宽度 100% + 高度自适应 */
  .video-wrapper {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%; /* 16:9 */
    background: #000;
  }

  .video-wrapper video,
  .video-wrapper iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }
</style>
</head>

<body>

<div class="navbar">我的网站</div>

<div class="content">

  <div class="video-wrapper">
    <video src="https://dogegoog.com/967711711.mp4" controls playsinline webkit-playsinline x5-playsinline></video>
  </div>

  <div class="video-wrapper">
    <video src="video2.mp4" controls playsinline webkit-playsinline x5-playsinline></video>
  </div>

  <div class="video-wrapper">
    <iframe 
      src="https://www.youtube.com/embed/dQw4w9WgXcQ"
      allowfullscreen
      webkitallowfullscreen
      mozallowfullscreen>
    </iframe>
  </div>

</div>

</body>
</html>
