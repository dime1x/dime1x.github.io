<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>手机全屏宽度视频</title>

<style>
  /* 网页高度不限制 */
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    width: 100%;
    height: auto; /* 高度无限制 */
  }

  /* 顶部菜单 */
  .navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: #333;
    color: #fff;
    padding: 12px 20px;
    z-index: 10;
  }

  /* 内容区域高度不限制 */
  .content {
    padding-top: 70px;
    width: 100%;
    height: auto; /* 高度无限制 */
  }

  /* 视频宽度最大化，高度自动 */
  video, iframe {
    width: 100%;
    height: auto; /* 高度不限制 */
    display: block;
    background: #000;
  }
</style>
</head>

<body>

<div class="navbar">我的网站</div>

<div class="content">

  <video src="https://dogegoog.com/967711711.mp4" controls playsinline webkit-playsinline x5-playsinline></video>

  <video src="video2.mp4" controls playsinline webkit-playsinline x5-playsinline></video>

  <iframe 
    src="https://www.youtube.com/embed/dQw4w9WgXcQ"
    allowfullscreen
    webkitallowfullscreen
    mozallowfullscreen>
  </iframe>

</div>

</body>
</html>
